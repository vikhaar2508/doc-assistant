spring:
  application:
    name: doc-assistant

  datasource:
    url: jdbc:postgresql://localhost:5432/docassistant
    username:
    password:
    driver-class-name: org.postgresql.Driver

  ai:
    # Anthropic Claude — chat and reasoning
    anthropic:
      api-key:
      options:
        model: claude-haiku-4-5-20251001
        temperature: 0.7


      # Ollama — embeddings only, data stays local
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false
      embedding:
        model: nomic-embed-text

    # Ollama — embeddings only, data stays local


    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768

# Confluence Configuration
confluence:
  base-url:
  username:
  api-token:
  space-key:

server:
  port: 8080

logging:
  level:
    com.confluence: DEBUG
    org.springframework.ai: INFO